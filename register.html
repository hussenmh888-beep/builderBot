<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BuilderBot — التسجيل</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .card { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
  
  /* تصميم الشعار الجديد */
  .logo { 
    width: 70px; height: 70px; background: var(--accent); 
    border-radius: 15px; margin: 0 auto 15px auto; 
    display: flex; justify-content: center; align-items: center; 
    font-size: 35px; font-weight: bold; color: white;
  }
  
  h2 { margin: 0 0 20px 0; }
  input { width: 100%; padding: 15px; margin: 10px 0; background: #334155; border: none; border-radius: 12px; color: white; box-sizing: border-box; text-align: right; }
  button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>

<div class="card" id="form">
  <div class="logo">B</div> 
  <h2>BuilderBot</h2>
  
  <input type="text" id="name" placeholder="الاسم الكامل">
  <input type="text" id="job" placeholder="الوظيفة">
  <input type="tel" id="phone" placeholder="رقم الهاتف">
  
  <button id="btn" onclick="submitData()">تأكيد وإرسال</button>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const urlParams = new URLSearchParams(window.location.search);
  const IS_TEST = urlParams.has('debug');
  const WEBHOOK_URL = IS_TEST ? 'https://hun8n.hun8n.cfd/webhook-test/1a20b622-88c3-4feb-b27a-d9b431e2580d' : 'https://hun8n.hun8n.cfd/webhook/1a20b622-88c3-4feb-b27a-d9b431e2580d';

  async function submitData() {
    const btn = document.getElementById('btn');
    const data = {
      name: document.getElementById('name').value,
      job: document.getElementById('job').value,
      phone: document.getElementById('phone').value,
      telegram_id: tg?.initDataUnsafe?.user?.id || 'NOT_TELEGRAM'
    };

    if(!data.name || !data.job || !data.phone) return alert("يرجى تعبئة كافة الحقول");

    btn.innerText = 'جاري الإرسال...';
    btn.disabled = true;

    try {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      document.getElementById('form').innerHTML = '<h2 style="margin:50px 0;">تم التسجيل بنجاح! 🎉</h2>';
      if(tg) setTimeout(() => tg.close(), 2000);
    } catch(e) {
      alert("خطأ في الاتصال!");
      btn.innerText = 'تأكيد وإرسال';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
