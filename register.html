<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuilderBot — التسجيل</title>
<style>
    body { font-family: sans-serif; background: #0d0f14; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #161923; padding: 24px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #252b38; }
    input { width: 100%; padding: 14px; margin: 10px 0; background: #1c2130; border: 1px solid #252b38; border-radius: 12px; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 14px; background: #3b82f6; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>

<div class="card" id="form-container">
    <h2 style="text-align: center;">BuilderBot</h2>
    <input type="text" id="name" placeholder="الاسم الكامل">
    <input type="text" id="job" placeholder="الوظيفة">
    <input type="tel" id="phone" placeholder="رقم الجوال">
    <button id="submitBtn" onclick="submitForm()">إرسال</button>
</div>

<script>
    async function submitForm() {
        const btn = document.getElementById('submitBtn');
        const data = {
            name: document.getElementById('name').value,
            job: document.getElementById('job').value,
            phone: document.getElementById('phone').value
        };

        btn.innerText = 'جاري الإرسال...';
        
        try {
            // نستخدم وضع no-cors لتجاوز حظر المتصفح
            await fetch('https://hun8n.hun8n.cfd/webhook/1a20b622-88c3-4feb-b27a-d9b431e2580d', {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            document.getElementById('form-container').innerHTML = '<h2 style="text-align:center;">تم الإرسال بنجاح! 🎉</h2>';
        } catch(e) {
            alert("حدث خطأ، تأكد من الاتصال.");
            btn.innerText = 'إرسال';
        }
    }
</script>
</body>
</html>
