<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuilderBot</title>
<style>
    body { background: #0d0f14; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #161923; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #252b38; }
    input { width: 100%; padding: 15px; margin: 10px 0; background: #1c2130; border: 1px solid #252b38; border-radius: 12px; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 15px; background: #3b82f6; border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div class="card" id="form">
    <h2 style="text-align:center;">BuilderBot</h2>
    <input type="text" id="name" placeholder="الاسم الكامل">
    <input type="text" id="job" placeholder="الوظيفة">
    <input type="tel" id="phone" placeholder="رقم الجوال">
    <button onclick="sendData()" id="btn">إرسال البيانات</button>
</div>

<script>
    async function sendData() {
        const btn = document.getElementById('btn');
        const data = {
            name: document.getElementById('name').value,
            job: document.getElementById('job').value,
            phone: document.getElementById('phone').value
        };

        btn.innerText = 'جاري الإرسال...';
        btn.disabled = true;

        try {
            // ضع هنا رابط Production URL الذي نسخته من n8n
            await fetch('https://hun8n.hun8n.cfd/webhook/1a20b622-88c3-4feb-b27a-d9b431e2580d', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            document.getElementById('form').innerHTML = '<h2 style="text-align:center;">تم الاستلام بنجاح! 🎉</h2>';
        } catch(e) {
            alert("حدث خطأ في الاتصال");
            btn.innerText = 'إرسال البيانات';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
