<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BuilderBot — التسجيل</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --card: #161923;
    --border: #252b38;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.25);
    --text: #f0f2f7;
    --muted: #6b7280;
    --success: #22c55e;
    --error: #ef4444;
    --input-bg: #1c2130;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.5s ease both;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(59,130,246,0.4);
  }

  .logo-text {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 40%, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  /* Steps */
  .step { display: none; }
  .step.active { display: block; }

  /* Form */
  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 15px;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }

  .field input::placeholder { color: #3d4557; }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .field input.error { border-color: var(--error); }
  .field-error {
    font-size: 11px;
    color: var(--error);
    margin-top: 5px;
    display: none;
  }
  .field input.error + .field-error { display: block; }

  /* Phone field */
  .phone-wrap {
    display: flex;
    align-items: center;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }

  .phone-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .phone-wrap.error { border-color: var(--error); }

  .phone-prefix {
    padding: 13px 12px 13px 6px;
    font-size: 15px;
    color: var(--muted);
    white-space: nowrap;
    border-right: 1px solid var(--border);
    user-select: none;
  }

  .phone-wrap input {
    border: none !important;
    box-shadow: none !important;
    border-radius: 0;
    background: transparent;
    flex: 1;
    padding: 13px 12px;
    direction: ltr;
    text-align: left;
  }

  /* Button */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff;
    box-shadow: 0 4px 15px rgba(59,130,246,0.35);
  }

  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:hover { box-shadow: 0 6px 20px rgba(59,130,246,0.5); }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    margin-top: 10px;
  }

  .btn-secondary:hover { border-color: var(--text); color: var(--text); }

  /* Review */
  .review-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 16px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .review-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
  }

  .review-item:last-of-type { border-bottom: none; margin-bottom: 20px; }

  .review-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .review-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-align: left;
    direction: ltr;
  }

  .review-value.rtl { direction: rtl; text-align: right; }

  /* Success */
  .success-wrap {
    text-align: center;
    padding: 20px 0;
  }

  .success-icon {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
    border: 2px solid rgba(34,197,94,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin: 0 auto 20px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .success-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .success-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Divider */
  .step-indicator {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.active {
    background: var(--accent);
    width: 20px;
    border-radius: 3px;
  }

  .dot.done { background: var(--success); }

  /* Loading */
  .btn-primary.loading {
    opacity: 0.7;
    pointer-events: none;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 8px;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .step.active { animation: slideIn 0.3s ease both; }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text">BuilderBot</div>
    </div>
    <div class="subtitle">سجّل بياناتك للبدء</div>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Step Indicator -->
    <div class="step-indicator">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
    </div>

    <!-- Step 1: Form -->
    <div class="step active" id="step1">

      <div class="field">
        <label>الاسم الكامل</label>
        <input type="text" id="name" placeholder="محمد أحمد" autocomplete="off">
        <div class="field-error">الرجاء إدخال الاسم الكامل</div>
      </div>

      <div class="field">
        <label>الوظيفة</label>
        <input type="text" id="job" placeholder="مطوّر — محاسب — مدير مشاريع..." autocomplete="off">
        <div class="field-error">الرجاء إدخال الوظيفة</div>
      </div>

      <div class="field">
        <label>رقم الجوال</label>
        <input type="tel" id="phone" placeholder="أدخل رقم الجوال" maxlength="15" inputmode="numeric" style="text-align:right; direction:rtl;">
        <div class="field-error" id="phoneError">الرجاء إدخال رقم جوال صحيح</div>
      </div>

      <button class="btn btn-primary" onclick="goToReview()">مراجعة البيانات ←</button>

    </div>

    <!-- Step 2: Review -->
    <div class="step" id="step2">

      <div class="review-title">تأكيد البيانات</div>

      <div class="review-item">
        <span class="review-label">الاسم</span>
        <span class="review-value rtl" id="rv-name"></span>
      </div>
      <div class="review-item">
        <span class="review-label">الوظيفة</span>
        <span class="review-value rtl" id="rv-job"></span>
      </div>
      <div class="review-item">
        <span class="review-label">الجوال</span>
        <span class="review-value" id="rv-phone"></span>
      </div>

      <button class="btn btn-primary" id="confirmBtn" onclick="submitForm()">✅ تأكيد وإرسال</button>
      <button class="btn btn-secondary" onclick="goBack()">← تعديل</button>

    </div>

    <!-- Step 3: Success -->
    <div class="step" id="step3">
      <div class="success-wrap">
        <div class="success-icon">✓</div>
        <div class="success-title">تم التسجيل بنجاح! 🎉</div>
        <div class="success-sub">بياناتك وصلت — سيتواصل معك الفريق قريباً.</div>
      </div>
    </div>

  </div>
</div>

<script>
  // Init Telegram WebApp
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  function setDot(step) {
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.className = 'dot';
      if (i < step - 1) d.classList.add('done');
      else if (i === step - 1) d.classList.add('active');
    });
  }

  function showStep(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
    setDot(n);
  }

  function goToReview() {
    const name  = document.getElementById('name');
    const job   = document.getElementById('job');
    const phone = document.getElementById('phone');
    let valid = true;

    // Validate name
    if (name.value.trim().length < 3) {
      name.classList.add('error'); valid = false;
    } else { name.classList.remove('error'); }

    // Validate job
    if (job.value.trim().length < 2) {
      job.classList.add('error'); valid = false;
    } else { job.classList.remove('error'); }

    // Validate phone
    const ph = phone.value.replace(/\D/g,'');
    if (ph.length < 7) {
      phone.classList.add('error');
      document.getElementById('phoneError').style.display = 'block';
      valid = false;
    } else {
      phone.classList.remove('error');
      document.getElementById('phoneError').style.display = 'none';
    }

    if (!valid) return;

    document.getElementById('rv-name').textContent  = name.value.trim();
    document.getElementById('rv-job').textContent   = job.value.trim();
    document.getElementById('rv-phone').textContent = ph;

    showStep(2);
  }

  function goBack() { showStep(1); }

  async function submitForm() {
    const btn = document.getElementById('confirmBtn');
    btn.classList.add('loading');
    btn.innerHTML = 'جاري الإرسال <span class="spinner"></span>';

    const data = {
      name:  document.getElementById('name').value.trim(),
      job:   document.getElementById('job').value.trim(),
      phone: document.getElementById('phone').value.replace(/\D/g,''),
      telegram_id: tg?.initDataUnsafe?.user?.id || null,
      telegram_username: tg?.initDataUnsafe?.user?.username || null,
    };

    const WEBHOOK_URL = 'https://YOUR_N8N_WEBHOOK_URL'; // ← غيّر هذا لاحقاً

    try {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
        mode: 'no-cors'
      });
    } catch(e) {
      console.warn('Webhook error:', e);
    }

    showStep(3);

    if (tg) {
      setTimeout(() => tg.close(), 2500);
    }
  }

  // Only allow numbers in phone field
  document.getElementById('phone').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g,'');
  });
</script>

</body>
</html>
