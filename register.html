<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>BuilderBot</title>
</head>
<body>
<div class="card" id="form-container">
  <input type="text" id="name" placeholder="الاسم">
  <input type="text" id="job" placeholder="الوظيفة">
  <input type="tel" id="phone" placeholder="الجوال">
  <button id="submitBtn" onclick="submitForm()">إرسال</button>
</div>

<script>
  async function submitForm() {
    const btn = document.getElementById('submitBtn');
    btn.innerText = 'جاري الإرسال...';
    
    const data = {
      name: document.getElementById('name').value,
      job: document.getElementById('job').value,
      phone: document.getElementById('phone').value
    };

    console.log("البيانات التي سيتم إرسالها:", data);

    try {
      const response = await fetch('https://hun8n.hun8n.cfd/webhook/1a20b622-88c3-4feb-b27a-d9b431e2580d', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      
      console.log("تمت محاولة الإرسال، حالة الاستجابة:", response.status);
      alert("تمت محاولة الإرسال! حالة الاتصال: " + response.status);
      document.getElementById('form-container').innerHTML = '<h2>تم الإرسال!</h2>';
      
    } catch(e) {
      console.error("خطأ:", e);
      alert("حدث خطأ: " + e.message);
      btn.innerText = 'إرسال';
    }
  }
</script>
</body>
</html>
